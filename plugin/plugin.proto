syntax = "proto3";

package missioncontrol.plugin.v1;

option go_package = "github.com/flanksource/incident-commander/plugin;plugin";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

message Empty {}

// PluginService is implemented by the plugin and called by the host.
service PluginService {
  rpc RegisterPlugin (RegisterRequest)  returns (PluginManifest);
  rpc Configure      (ConfigureRequest) returns (ConfigureResponse);
  rpc ListOperations (Empty)            returns (OperationList);
  rpc Invoke         (InvokeRequest)    returns (InvokeResponse);
  rpc Health         (Empty)            returns (HealthStatus);
  rpc Shutdown       (Empty)            returns (Empty);
}

// HostService is implemented by the host and called by the plugin
// over the go-plugin GRPCBroker reverse channel.
service HostService {
  rpc GetConfigItem  (GetConfigItemRequest) returns (ConfigItem);
  rpc ListConfigs    (ListConfigsRequest)   returns (ConfigItemList);
  rpc GetConnection  (GetConnectionRequest) returns (ResolvedConnection);
  rpc Log            (LogEntry)             returns (Empty);
  rpc WriteArtifact  (Artifact)             returns (ArtifactRef);
  rpc ReadArtifact   (ArtifactRef)          returns (Artifact);
  rpc InvokePlugin   (InvokePluginRequest)  returns (InvokeResponse);
}

message PluginManifest {
  string name              = 1;
  string version           = 2;
  string description       = 3;
  uint32 protocol_version  = 4;
  repeated string capabilities = 5;
  repeated OperationDef operations = 6;
  uint32 ui_port = 7;
  repeated TabSpec tabs = 8;
  repeated PluginRole roles = 9;
}

message PluginRole {
  string name = 1;
  string description = 2;
}

message TabSpec {
  string name = 1;
  string icon = 2;
  string path = 3;
  string scope = 4;
}

message OperationDef {
  string name              = 1;
  string description       = 2;
  google.protobuf.Struct params_schema = 3;
  string result_mime       = 4;
  string scope             = 5;
  bool   destructive       = 6;
  repeated string required_permissions = 7;
  repeated HTTPBinding http = 8;
}

message HTTPBinding {
  string method = 1;
  reserved 2, 3, 4;
  reserved "path", "result_mime", "streaming";
}

message RegisterRequest {
  uint32 host_protocol_version = 1;
  string host_version          = 2;
  uint32 host_broker_id        = 3;
  map<string,string> env       = 4;
}

message ConfigureRequest {
  google.protobuf.Struct settings = 1;
}

message ConfigureResponse { repeated string warnings = 1; }

message InvokeRequest {
  string operation     = 1;
  bytes  params_json   = 2;
  string config_item_id = 3;
  google.protobuf.Timestamp deadline = 4;
}

message InvokeResponse {
  bytes  result        = 1;
  string mime          = 2;
  string error_message = 3;
  string error_code    = 4;
  repeated LogEntry logs = 5;
}

message InvokePluginRequest {
  string plugin         = 1;
  string operation      = 2;
  bytes  params_json    = 3;
  string config_item_id = 4;
  google.protobuf.Timestamp deadline = 5;
}

message OperationList { repeated OperationDef operations = 1; }
message HealthStatus  { bool ok = 1; string message = 2; }

message ConfigItem {
  string id        = 1;
  string name      = 2;
  string type      = 3;
  string namespace = 4;
  string agent_id  = 5;
  google.protobuf.Struct properties = 6;
  google.protobuf.Struct config     = 7;
  map<string,string> labels = 8;
  map<string,string> tags   = 9;
  string health = 10;
  string status = 11;
}

message ConfigItemList {
  repeated ConfigItem items = 1;
  string next_cursor = 2;
}

message GetConfigItemRequest { string id = 1; }

message ResourceSelector {
  string agent          = 1;
  string scope          = 2;
  string cache          = 3;
  string search         = 4;
  int32 limit           = 5;
  bool include_deleted  = 6;
  string id             = 7;
  string name           = 8;
  string namespace      = 9;
  string tag_selector   = 10;
  string label_selector = 11;
  string field_selector = 12;
  string health         = 13;
  repeated string types = 14;
  repeated string statuses = 15;
}

message ListConfigsRequest {
  ResourceSelector selector = 1;
  int32 limit               = 2;
  string cursor             = 3;
}

// GetConnectionRequest asks the host to resolve a connection by one of four
// supported lookups: type, scraper config item, plugin-defined label, or direct
// connection id.
//
// Type and label lookups use spec.connections mappings from the Plugin CRD.
// config_item_id preserves the existing behavior: it resolves the connection
// used by the scraper that created the config item. connection_id resolves a
// Mission Control connection by id; plugins attached to MissionControl::Connection
// config items can pass their config_item_id because connection config item ids
// are the same as the underlying connection ids.
message GetConnectionRequest {
  oneof lookup {
    string type           = 1; // e.g. "sql", "aws", "kubernetes", "gcp", "azure", "s3"
    string config_item_id = 2; // resolve the connection used by this config item's scraper
    string label          = 3; // resolve a plugin-defined connection label mapping
    string connection_id  = 4; // resolve a Mission Control connection by id
  }
}

message ResolvedConnection {
  string type        = 1;
  string url         = 2;
  string username    = 3;
  string password    = 4;
  string certificate = 5;
  string token       = 6;
  google.protobuf.Struct properties = 7;
  google.protobuf.Timestamp expires_at = 8;
}

message LogEntry {
  string level   = 1; // debug|info|warn|error
  string message = 2;
  map<string,string> fields = 3;
  google.protobuf.Timestamp ts = 4;
}

message Artifact {
  string name         = 1;
  string content_type = 2;
  bytes  data         = 3;
  map<string,string> metadata = 4;
}

message ArtifactRef {
  string id  = 1;
  string url = 2;
}
