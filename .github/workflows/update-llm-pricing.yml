name: Update LLM Pricing Registry

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-llm-pricing
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      PR_BRANCH: chore/update-llm-pricing-registry

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.FLANKBOT }}
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate pricing registry
        run: make generate-llm-pricing

      - name: Check for registry changes
        id: changes
        run: |
          if git diff --quiet -- llm/pricing_registry.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git diff --stat -- llm/pricing_registry.json
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push registry update
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "flankbot"
          git config user.email "flankbot@users.noreply.github.com"
          git checkout -B "$PR_BRANCH"
          git add llm/pricing_registry.json
          git commit -m "chore: update llm pricing registry"
          git push --force-with-lease origin "$PR_BRANCH"

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.FLANKBOT }}
        run: |
          if gh pr view "$PR_BRANCH" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Pull request already exists for $PR_BRANCH"
            exit 0
          fi

          gh pr create \
            --repo "${{ github.repository }}" \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$PR_BRANCH" \
            --title "chore: update llm pricing registry" \
            --body "Automated update from models.dev using \`make generate-llm-pricing\`."
