on:
  pull_request:
permissions:
  contents: read
name: Test
jobs:
  test:
    permissions:
      contents: read
      checks: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Free up disk space
        run: |
          initial_space=$(df / | grep / | awk '{print $4}')
          docker system prune -af
          rm -rf /usr/share/dotnet
          rm -rf /opt/ghc
          rm -rf /usr/local/share/boost
          rm -rf $AGENT_TOOLSDIRECTORY
          rm -rf /opt/hostedtoolcache

          final_space=$(df / | grep / | awk '{print $4}')
          difference=$((final_space - initial_space))
          echo "Disk space difference (in KB): $difference"

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.x
          cache: false

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check disk space before cache
        run: |
          echo "Disk space before cache restore:"
          df -h / | grep -E '^Filesystem|/'
          echo "Available: $(df / | grep / | awk '{print $4}') KB"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            .bin
          key: cache-go-1.26.x-${{ hashFiles('**/go.sum') }}-${{ hashFiles('.bin/*') }}
          restore-keys: |
            cache-go-1.26.x-

      - name: Check disk space after cache
        run: |
          echo "Disk space after cache restore:"
          df -h / | grep -E '^Filesystem|/'
          echo "Available: $(df / | grep / | awk '{print $4}') KB"
          echo "Cache directories size:"
          du -sh ~/go/pkg/mod ~/.cache/go-build .bin 2>/dev/null || echo "Some cache directories not found yet"

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Symlink bun into /usr/local/bin
        run: |
          which bun
          sudo ln -sf "$(which bun)" /usr/local/bin/bun
          /usr/local/bin/bun --version

      - name: Install facet
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin to a known-good release. facet 0.1.47 migrated the CLI runtime
          # from Bun to Node and rewrote the Vite builder + NODE_PATH/module
          # resolution, which broke subpath-export resolution (e.g.
          # "@flanksource/icons/icon") under both Rollup and Rolldown. Unpin
          # once a fixed facet release is available.
          FACET_VERSION: v0.1.46
        run: |
          set -euo pipefail
          # Authenticate the API call so it doesn't hit the anonymous rate limit
          # (which returns an HTML error page that then gets saved as the binary).
          url=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/flanksource/facet/releases/tags/${FACET_VERSION}" \
            | jq -r '.assets[] | select(.name == "facet-linux-x64") | .browser_download_url')
          [ -n "$url" ] || { echo "::error::could not resolve facet download URL for ${FACET_VERSION}"; exit 1; }
          curl -fsSL "$url" -o /usr/local/bin/facet
          chmod +x /usr/local/bin/facet
          facet --version

      - name: Inject GEMINI_API_KEY
        run: |
          sed -i "s/GEMINI_API_KEY_PLACEHOLDER/${GEMINI_API_KEY}/" playbook/testdata/connections/gemini.yaml
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make static ci-test

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always() && github.event.repository.fork == 'false'
        with:
          files: test/test-results.xml
          check_name: E2E - ${{matrix.suite}}

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Free up disk space
        run: |
          initial_space=$(df / | grep / | awk '{print $4}')
          docker system prune -af
          rm -rf /usr/share/dotnet
          rm -rf /opt/ghc
          rm -rf /usr/local/share/boost
          rm -rf $AGENT_TOOLSDIRECTORY
          rm -rf /opt/hostedtoolcache

          final_space=$(df / | grep / | awk '{print $4}')
          difference=$((final_space - initial_space))
          echo "Disk space difference (in KB): $difference"

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.x
          cache: false

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check disk space before cache
        run: |
          echo "Disk space before cache restore:"
          df -h / | grep -E '^Filesystem|/'
          echo "Available: $(df / | grep / | awk '{print $4}') KB"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            .bin
          key: cache-go-1.26.x-${{ hashFiles('**/go.sum') }}-${{ hashFiles('.bin/*') }}
          restore-keys: |
            cache-go-1.26.x-

      - name: Check disk space after cache
        run: |
          echo "Disk space after cache restore:"
          df -h / | grep -E '^Filesystem|/'
          echo "Available: $(df / | grep / | awk '{print $4}') KB"
          echo "Cache directories size:"
          du -sh ~/go/pkg/mod ~/.cache/go-build .bin 2>/dev/null || echo "Some cache directories not found yet"

      # - name: Set up Kind & Kubectl
      #   uses: helm/kind-action@v1.12.0
      #   with:
      #     cluster_name: kind-test

      - name: E2E Test
        run: make ginkgo e2e
