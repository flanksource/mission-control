  name: "prod-eks-cluster"
  type: "AWS::EKS::Cluster"
  configClass: "Cluster"
  status: "Active"
  health: "healthy"
  description: "Production EKS cluster running Mission Control workloads in us-east-1"
  labels:
    env: "production"
    team: "platform"
    region: "us-east-1"
  costTotal30d: 4280.50
  createdAt: "2025-03-15T09:00:00Z"
  updatedAt: "2026-03-28T12:00:00Z"

categoryMappings:
  - category: rbac.granted
    filter: 'changeType == "PermissionGranted" || changeType == "PermissionAdded" || changeType == "IAMRoleAdded"'
  - category: rbac.revoked
    filter: 'changeType == "PermissionRevoked" || changeType == "PermissionRemoved" || changeType == "IAMRoleRemoved"'
  - category: backup.success
    filter: 'changeType == "BackupCompleted" || changeType == "BackupSuccessful"'
  - category: backup.failed
    filter: 'changeType == "BackupFailed"'
  - category: backup.progress
    filter: 'changeType == "BackupStarted" || changeType == "BackupRunning" || changeType == "BackupEnqueued"'
  - category: backup.restore
    filter: 'changeType == "BackupRestored" || changeType == "RestoreCompleted"'
  - category: deployment.spec
    filter: 'changeType == "diff"'
  - category: deployment.scale
    filter: 'changeType == "ScalingReplicaSet"'
  - category: deployment.policy
    filter: 'changeType == "PolicyUpdate"'

