findings:
  - id: "fnd-001"
    type: "security"
    severity: "high"
    title: "RDS instance has public accessibility enabled"
    description: "The RDS instance mission-control-db has PubliclyAccessible=true. Restrict access via security groups and disable public endpoint."
    date: "2026-01-15T09:00:00Z"
    lastObserved: "2026-02-27T09:30:00Z"
    status: "open"
    remediation: "Set PubliclyAccessible=false on the RDS instance and update security group rules."
  - id: "fnd-002"
    type: "compliance"
    severity: "medium"
    title: "RDS backup retention below recommended minimum"
    description: "Backup retention is set to 3 days. AWS recommends at least 7 days for production workloads."
    date: "2026-01-15T09:00:00Z"
    lastObserved: "2026-02-27T09:30:00Z"
    status: "open"
    remediation: "Increase BackupRetentionPeriod to 7 or more days."
  - id: "fnd-003"
    type: "security"
    severity: "critical"
    title: "S3 bucket mission-control-assets has public read ACL"
    description: "The S3 bucket is publicly readable which may expose sensitive configuration files."
    date: "2026-02-01T09:00:00Z"
    lastObserved: "2026-02-27T09:30:00Z"
    status: "in-progress"
    remediation: "Remove public ACL and enable S3 Block Public Access settings."
  - id: "fnd-004"
    type: "reliability"
    severity: "low"
    title: "No pod disruption budget configured for incident-commander"
    description: "Without a PodDisruptionBudget, rolling updates may cause temporary service interruption."
    date: "2026-02-10T09:00:00Z"
    lastObserved: "2026-02-27T09:30:00Z"
    status: "resolved"
  - id: "fnd-005"
    type: "compliance"
    severity: "high"
    title: "Container images not using digest pinning"
    description: "Deployments reference mutable image tags (e.g. :latest) rather than immutable digests."
    date: "2026-02-15T09:00:00Z"
    lastObserved: "2026-02-27T09:30:00Z"
    status: "open"
    remediation: "Pin all container images to specific SHA256 digests in deployment manifests."

