apiVersion: mission-control.flanksource.com/v1
kind: Notification
metadata:
  name: pod-with-incoming-inhibition
spec:
  events:
    - config.unhealthy
    - config.warning
  repeatInterval: 4h
  to:
    connection: connection://mission-control/slack
  inhibitions:
    - direction: incoming
      from: Kubernetes::Pod
      to:
        - Kubernetes::Deployment
        - Kubernetes::ReplicaSet
      depth: 2
