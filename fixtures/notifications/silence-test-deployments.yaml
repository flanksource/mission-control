---
apiVersion: mission-control.flanksource.com/v1
kind: NotificationSilence
metadata:
  name: low-severity-jobs
spec:
  description: silence notification from all jobs with low severity
  from: 2024-01-01
  until: 2025-01-01
  selectors:
    - types:
        - Kubernetes::Job
      tags:
        - severity=low
