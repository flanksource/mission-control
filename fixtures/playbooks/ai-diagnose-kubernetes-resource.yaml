---
# yaml-language-server: $schema=../../config/schemas/playbook.schema.json
apiVersion: mission-control.flanksource.com/v1
kind: Playbook
metadata:
  name: diagnose-kubernetes-resource
spec:
  description: Use AI to diagnose unhealthy kubernetes resources
  configs:
    - types:
        - Kubernetes::Pod
        - Kubernetes::Deployment
        - Kubernetes::HelmRelease
        - Kubernetes::ContainerCluster
  parameters:
    - name: prompt
      label: Prompt
      default: Using the context provided, as a Kubernetes engineer find out why {{.config.name}} is not healthy
  actions:
    - name: query
      ai:
        backend: anthropic
        model: claude-3-5-sonnet-latest
        apiKey:
          valueFrom:
            secretKeyRef:
              name: anthropic
              key: API_KEY
        prompt: '{{.params.prompt}}'
        changes:
          since: 2d
        analysis:
          since: 2d
        relationships:
          - depth: 3
            direction: outgoing
            changes:
              since: 12h
          - depth: 5
            direction: incoming
            changes:
              since: 12h
