# yaml-language-server: $schema=../playbook-fixture.schema.json
config: EKSCluster
setup:
  opensearch: true
  permissions:
    - ../fixtures/allow-artifacts.yaml

playbook:
  title: OpenSearch Logs
  icon: elasticsearch
  category: Logs
  description: Fetch logs from OpenSearch
  configs:
    - types:
        - Kubernetes::Pod
        - Kubernetes::Deployment
  parameters:
    - name: limit
      label: Limit
      description: The maximum number of logs to fetch
      required: false
      default: "100"
  actions:
    - name: frontend-logs
      logs:
        opensearch:
          address: http://localhost:9200
          query: |
            {
              "query": {
                "bool": {
                  "filter": [
                    { "term": { "kubernetes.labels.app": "frontend" } }
                  ]
                }
              }
            }
          index: k8s-logs
          limit: $(.params.limit)

output:
  run:
    status: completed
  actions:
    - name: frontend-logs
      status: completed
      artifact_logs: |
        React app started successfully
        User authentication successful for user: john.doe@example.com
