# yaml-language-server: $schema=../playbook-fixture.schema.json
config: LogisticsAPIPodConfig
setup:
  smtp: true
  permissions:
    - ../fixtures/allow-artifacts.yaml
params:
  view: "{{viewRef}}"
  smtp_url: "{{smtpURL}}"

playbook:
  title: Report Email Test
  configs:
    - types:
        - Kubernetes::Pod
  parameters:
    - name: view
      label: View reference
    - name: smtp_url
      label: SMTP URL
  actions:
    - name: generate-report
      report:
        view: $(.params.view)
        format: html
    - name: generate-pdf
      report:
        view: $(.params.view)
        format: pdf
    - name: send-email
      notification:
        url: $(.params.smtp_url)
        title: Pod Report
        message: '{{(getAction "generate-report").result.format}}'
        attachments:
          - content: artifact://generate-pdf/*.pdf
            filename: report.pdf

output:
  run:
    status: completed
  actions:
    - name: generate-report
      status: completed
      result:
        format: html
      artifacts:
        - content_type: text/html
    - name: generate-pdf
      status: completed
      result:
        format: pdf
      artifacts:
        - content_type: application/pdf
    - name: send-email
      status: completed

assertions:
  - size(emails) >= 1
  - emails[0].body.contains('Pod Report')
  - emails[0].body.contains('report.pdf')
  - emails[0].body.contains('application/pdf')
