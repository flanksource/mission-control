apiVersion: mission-control.flanksource.com/v1
kind: Playbook
metadata:
  name: facet-pdf-test
  namespace: default
spec:
  title: Facet PDF Test
  configs:
    - types:
        - Kubernetes::Pod
  parameters:
    - name: view
      label: View reference
    - name: facet_url
      label: Facet server URL
  actions:
    - name: generate-facet-pdf
      report:
        view: $(.params.view)
        format: facet-pdf
        facet:
          url: $(.params.facet_url)
