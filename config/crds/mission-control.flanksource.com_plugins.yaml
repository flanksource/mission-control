---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: plugins.mission-control.flanksource.com
spec:
  group: mission-control.flanksource.com
  names:
    kind: Plugin
    listKind: PluginList
    plural: plugins
    singular: plugin
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: Plugin is the schema for the Plugins API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PluginSpec configures a binary-backed Mission Control plugin.

              A Plugin is a separate process that mission-control supervises and talks
              to over bi-directional gRPC. The plugin can register UI tabs that are
              iframed into the catalog detail page, and operations that are exposed
              over the HTTP API and as CLI subcommands.
            properties:
              address:
                description: |-
                  Address, when set, marks this plugin as remote: Mission Control dials the
                  plugin's gRPC server at this network address (host:port) instead of
                  installing and supervising a local binary. Source/Version/Checksum are
                  ignored for remote plugins.
                type: string
              audit:
                description: |-
                  Audit selects plugin operations whose invocations should be recorded as
                  catalog config changes. Each entry is matched against the operation name
                  using Mission Control match expressions: exact names, wildcards such as
                  "*" or "logs-*", and negations such as "!debug". When omitted or empty,
                  plugin invocations are not recorded as changes.
                items:
                  type: string
                type: array
              caCert:
                description: |-
                  CACert is an optional PEM CA bundle used to verify the TLS certificate the
                  remote plugin serves at Address. When empty, Mission Control dials the
                  plugin in plaintext (only safe for same-host plugins). Only meaningful when
                  Address is set.
                type: string
              checksum:
                description: |-
                  Checksum optionally pins the downloaded binary to a known good hash.
                  When set, deps refuses to install a binary with a different checksum.
                type: string
              connections:
                description: |-
                  Connections defines mappings from plugin connection requests to
                  Mission Control connections. Types maps connection types such as
                  "sql" or "aws" to a connection URI, while Labels maps plugin-defined
                  labels such as "artifactProd" or "sqlDev" to a connection URI.
                properties:
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels maps plugin-defined connection labels to Mission
                      Control connections.
                    type: object
                  types:
                    additionalProperties:
                      type: string
                    description: |-
                      Types maps a connection type requested by the plugin to the Mission Control
                      connection that should satisfy that request.
                    type: object
                type: object
              hostGRPCAddress:
                description: |-
                  HostGRPCAddress is the address this remote plugin uses to reach Mission
                  Control's HostService back-channel (for connection resolution and other
                  callbacks). Set it per plugin when plugins run in different networks and
                  reach Mission Control at different addresses. When empty, the host's
                  configured default is used. Only meaningful when Address is set.
                type: string
              properties:
                additionalProperties:
                  type: string
                description: |-
                  Properties are arbitrary key/value settings forwarded to the plugin
                  via the Configure() RPC at startup. Use this for plugin-specific
                  configuration that doesn't fit any of the other fields.
                type: object
              selector:
                description: |-
                  Selector decides which catalog (config) items this plugin's tabs
                  attach to. The same ResourceSelector semantics used by Playbook.Configs
                  apply: filter by config type, labels, tags, agent, namespace, name.
                  An empty selector matches every config item.
                properties:
                  agent:
                    description: |-
                      Agent can be the agent id or the name of the agent.
                       Additionally, the special "self" value can be used to select resources without an agent.
                    type: string
                  cache:
                    description: |-
                      Cache directives
                       'no-cache' (should not fetch from cache but can be cached)
                       'no-store' (should not cache)
                       'max-age=X' (cache for X duration)
                    type: string
                  fieldSelector:
                    type: string
                  health:
                    description: |-
                      Health filters resources by the health.
                      Multiple healths can be provided separated by comma.
                    type: string
                  id:
                    type: string
                  includeDeleted:
                    type: boolean
                  labelSelector:
                    type: string
                  limit:
                    type: integer
                  name:
                    type: string
                  namespace:
                    type: string
                  scope:
                    description: |-
                      Scope is the reference for parent of the resource to select.
                      For config items, the scope is the scraper id
                      For checks, it's canaries and
                      For components, it's topology.
                      It can either be a uuid or namespace/name
                    type: string
                  search:
                    description: Search query that applies to the resource name, tag
                      & labels.
                    type: string
                  statuses:
                    description: Statuses filter resources by the status
                    items:
                      type: string
                    type: array
                  tagSelector:
                    type: string
                  types:
                    description: Types filter resources by the type
                    items:
                      type: string
                    type: array
                type: object
              source:
                description: |-
                  Source is the deps package name or URL the binary is installed from
                  (via flanksource/deps). Mission-control places the resulting binary
                  in $MISSION_CONTROL_PLUGIN_PATH. Required unless Address is set, in
                  which case the plugin is remote and there is no binary to install.
                type: string
              version:
                description: |-
                  Version of the binary to install. Forwarded to deps.Install verbatim
                  (e.g. a semver tag, "latest", or a git ref the deps package supports).
                type: string
            type: object
            x-kubernetes-validations:
            - message: spec.source is required (or spec.address for a remote plugin)
              rule: has(self.source) || has(self.address)
          status:
            description: PluginStatus reflects the supervised state of the plugin
              process.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              installedPath:
                description: InstalledPath is where deps placed the binary on the
                  host filesystem.
                type: string
              observedGeneration:
                format: int64
                type: integer
              pluginVersion:
                description: PluginVersion is the version reported by the plugin in
                  its manifest.
                type: string
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
